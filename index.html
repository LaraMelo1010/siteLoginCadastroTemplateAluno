<!DOCTYPE html> <!-- Esta linha indica que este é um documento HTML5 -->
<html lang="en"> <!-- Aqui dizemos que a página está em inglês -->
<head>
    <!-- Define a forma como o texto será mostrado -->
    <meta charset="UTF-8"> 
     <!-- Aqui você define o título da página que aparece na aba do navegador -->
    <title>Login</title>
    <!-- Este link conecta o arquivo de estilos CSS para deixar a página bonita -->
    <link rel="stylesheet" href="style.css"> 
    <!-- Este link conecta a biblioteca FontAwesome para incluir ícones na página -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> 
</head>
<body>
    <div class ="container">
        <img src="F1.png" alt="logo" class="logo">
    </div>
    <div class ="login">
        <h2> Sing in </h2>
        <h3>Enter your F1 account email and password below</h3>
        <div class="inputBx">
            <label for="username"> Email </label>
            <input type="text" id="username" placeholder="Enter your email"> 
        </div>
        <div class ="inputBx"> 
             <label for="password"> Password </label>
            <input type="password" id="password" placeholder="Enter your password"> 
        </div>
        <div class ="button">
            <button id="login_button">Sing in</button>
        </div>
        <p class="text-center">Or if you dont have an account <a href="cadastro.html">Register</a></p>
    </div>    
</body>
</html>
